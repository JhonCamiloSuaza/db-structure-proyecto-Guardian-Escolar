services:
  postgres:
    image: postgres:15
    container_name: gps_guardian_escolar_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gps_guardian_escolar}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./01_ddl:/db/01_ddl:ro
      - ./02_dml:/db/02_dml:ro
      - ./03_dcl:/db/03_dcl:ro
      - ./scripts/init-database.sh:/docker-entrypoint-initdb.d/001_init_database.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: gps_guardian_escolar_postgres_data
