databaseChangeLog:
  - changeSet:
      id: 007-dcl-grant-application-permissions
      author: gps-guardian-escolar
      logicalFilePath: 03_dcl/01_grants/001_grant_application_permissions.sql
      labels: "dcl,grants"
      comment: Grants database privileges to project database roles.
      changes:
        - sqlFile:
            path: 001_grant_application_permissions.sql
